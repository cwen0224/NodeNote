<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeNote - Universal JSON Notebook</title>
    <script type="module" crossorigin src="/NodeNote/assets/index-DJvUhZLQ.js"></script>
    <link rel="stylesheet" crossorigin href="/NodeNote/assets/index-aTAEKTg3.css">
  </head>
  <body>
    <!-- DIAGNOSTIC OVERLAY -->
    <div id="sys-diag">
      <div id="diag-status">NodeNote: Loading modules...</div>
      <div id="diag-version" style="font-size:0.7rem; opacity:0.8;">v--:--</div>
      <div id="diag-errors"></div>
    </div>
    <script>
      window.addEventListener('error', (e) => {
        const errDiv = document.getElementById('diag-errors');
        if(errDiv) errDiv.innerHTML += `\n[ERROR] ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`;
        window.alert("DETECTED ERROR: " + e.message); // Emergency alert to be visible
      });
      window.addEventListener('unhandledrejection', (e) => {
        const errDiv = document.getElementById('diag-errors');
        if(errDiv) errDiv.innerHTML += `\n[PROMISE ERROR] ${e.reason}`;
      });
    </script>
    
    <div id="tray-drawer" class="tray-drawer glass-panel is-collapsed" aria-label="Tray drawer">
      <button id="btn-tray-toggle" class="tray-drawer-handle" type="button" aria-label="開啟托盤" aria-expanded="false">Tray</button>
      <div class="tray-drawer-panel">
        <div class="tray-drawer-header">
          <div class="tray-drawer-title">Tray</div>
          <button id="btn-tray-close" type="button" aria-label="關閉托盤">×</button>
        </div>
        <div class="tray-drawer-body">
          <div class="tray-slots" id="tray-slots">
            <!-- 1-15 Tray slots will be injected here later -->
          </div>
        </div>
      </div>
    </div>

    <!-- Top toolbar for tray and actions -->
    <div id="toolbar" class="glass-panel">
      <div class="toolbar-primary">
        <div class="toolbar-folder-nav">
          <button id="btn-folder-back" type="button">Back</button>
          <div id="folder-breadcrumb" aria-label="Folder breadcrumb"></div>
        </div>
      </div>
      <div class="toolbar-actions">
        <div class="actions">
          <button id="btn-folder-group" type="button">Group</button>
          <button id="btn-cloud-sync" type="button">Cloud</button>
          <button id="btn-undo">Undo</button>
          <button id="btn-redo">Redo</button>
          <div class="prompt-copy-wrap">
            <button id="btn-ai-prompt-copy" type="button">複製提詞</button>
            <div id="prompt-picker" class="prompt-picker glass-panel" hidden>
              <button type="button" class="prompt-picker-item" data-prompt-mode="note">筆記版</button>
              <button type="button" class="prompt-picker-item" data-prompt-mode="story">劇情版</button>
              <button type="button" class="prompt-picker-item" data-prompt-mode="media">媒體版</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="utility-dock" class="utility-dock glass-panel">
      <div class="utility-status">
        <div id="build-badge" class="toolbar-badge">v--:--</div>
        <div id="cloud-status-badge" class="toolbar-badge">Cloud: off</div>
      </div>
    </div>

    <!-- The infinite whiteboard main container -->
    <div id="viewport">
      <!-- Grid background overlay -->
      <div id="grid-bg"></div>
      
      <!-- The pannable/zoomable canvas surface -->
      <div id="canvas">
        <!-- SVG layer for bezier curves -->
        <svg id="svg-layer"></svg>
        
        <!-- DOM layer for HTML nodes -->
        <div id="node-layer"></div>
      </div>

      <div id="selection-marquee" class="selection-marquee" hidden aria-hidden="true"></div>
    </div>

    <!-- Minimap UI overlay -->
    <div id="minimap" class="glass-panel">
      <div id="minimap-content"></div>
      <div id="minimap-viewport"></div>
    </div>

  </body>
</html>
